services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind
      POSTGRES_DB: documind_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind -d documind_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./models:/app/models
    environment:
      DATABASE_URL: postgresql+psycopg://documind:documind@db:5432/documind_db
      DEBUG: "true"
      EMBEDDING_MODEL: /app/models/MiniLM
      LLM_MODEL: /app/models/Qwen2.5
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      HF_HOME: "/root/.cache/huggingface"
    depends_on:
      db:
        condition: service_healthy
    command: /app/.venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 300

volumes:
  postgres_data:
