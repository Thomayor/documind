apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: documind-postgres
  labels:
    app: documind-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: documind-postgres
  template:
    metadata:
      labels:
        app: documind-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: documind
            - name: POSTGRES_PASSWORD
              value: documind
            - name: POSTGRES_DB
              value: documind_db
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "documind"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: documind-postgres
spec:
  selector:
    app: documind-postgres
  ports:
    - port: 5432
      targetPort: 5432
