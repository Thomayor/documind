apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: documind-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: documind.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: documind-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: documind-frontend
                port:
                  number: 3000
