apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: documind
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thomayor/documind.git
    targetRevision: master
    path: k8s/documind
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
